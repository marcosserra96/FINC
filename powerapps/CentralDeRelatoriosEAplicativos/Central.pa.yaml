                        "LINK DE ACESSO *"
                    )
                  Weight: ='TextCanvas.Weight'.Bold
                  Width: =Parent.Width - 48
                  X: =24
                  Y: =406

            - txtFormLink:
                Control: TextInput@0.0.54
                Properties:
                  AccessibleLabel: ="Link de acesso ao relatório ou aplicativo"
                  Appearance: ='TextInputCanvas.Appearance'.Outline
                  Height: =36
                  Placeholder: |-
                    =If(
                        varModoFormulario = "EDITAR",
                        "Deixe em branco para manter o link atual",
                        "https://..."
                    )
                  Width: =Parent.Width - 48
                  X: =24
                  Y: =422

            - lblRotuloDescricao:
                Control: Text@0.0.51
                Properties:
                  FontColor: =RGBA(102, 119, 125, 1)
                  Height: =14
                  Size: =8
                  Text: ="DESCRIÇÃO"
                  Weight: ='TextCanvas.Weight'.Bold
                  Width: =Parent.Width - 48
                  X: =24
                  Y: =468

            - txtFormDescricao:
                Control: TextInput@0.0.54
                Properties:
                  AccessibleLabel: ="Descrição do conteúdo"
                  Appearance: ='TextInputCanvas.Appearance'.Outline
                  Height: =84
                  Mode: =TextMode.MultiLine
                  Placeholder: |-
                    =If(
                        varModoFormulario = "EDITAR",
                        "Deixe em branco para manter a descrição atual" & Char(10) & "Atual: " & PlainText(Coalesce(varRegistroSelecionado.Descrição, "-")),
                        "Descrição do conteúdo"
                    )
                  Width: =Parent.Width - 48
                  X: =24
                  Y: =484

            - lblErroFormulario:
                Control: Text@0.0.51
                Properties:
                  FontColor: =RGBA(243, 112, 33, 1)
                  Height: =34
                  Size: =10
                  Text: =varErroFormulario
                  Visible: =!IsBlank(varErroFormulario)
                  VerticalAlign: =VerticalAlign.Middle
                  Weight: ='TextCanvas.Weight'.Semibold
                  Width: =Parent.Width - 48
                  X: =24
                  Y: =576

            - btnCancelarModal:
                Control: Button@0.0.45
                Properties:
                  AccessibleLabel: ="Cancelar"
                  BorderColor: =RGBA(184, 196, 199, 1)
                  BorderThickness: =1
                  DisplayMode: =If(varSalvando, DisplayMode.Disabled, DisplayMode.Edit)
                  Height: =42
                  Text: ="Cancelar"
                  Width: =110
                  X: =Parent.Width - 24 - 140 - 12 - 110
                  Y: =Max(624, Parent.Height - 64)
                  OnSelect: |-
                    =If(
                        varSalvando,
                        false,
                        If(
                            !IsBlank(Trim(txtFormNome.Value)) Or
                            !IsBlank(Trim(txtFormDescricao.Value)) Or
                            !IsBlank(Trim(txtFormLink.Value)) Or
                            !IsBlank(Trim(txtFormPeriodicidade.Value)) Or
                            !IsBlank(Trim(txtFormNovoResponsavelEmail.Value)),
                            Set(varConfirmarDescarte, true),
                            Set(varModalAberto, false);
                            Set(varRegistroSelecionado, Blank());
                            Set(varErroFormulario, "")
                        )
                    )

            - btnSalvarModal:
                Control: Button@0.0.45
                Properties:
                  AccessibleLabel: ="Salvar"
                  BorderThickness: =0
                  DisplayMode: =If(varSalvando, DisplayMode.Disabled, DisplayMode.Edit)
                  Height: =42
                  Text: =If(varSalvando, "Salvando...", "Salvar")
                  Width: =140
                  X: =Parent.Width - 24 - 140
                  Y: =Max(624, Parent.Height - 64)
                  OnSelect: |-
                    =If(
                        !varSalvando,
                        Set(varErroFormulario, "");
                        With(
                            {
                                vNomeEfetivo:
                                    If(
                                        IsBlank(Trim(txtFormNome.Value)),
                                        Coalesce(varRegistroSelecionado.'Nome do Relatório', ""),
                                        Trim(txtFormNome.Value)
                                    ),
                                vDescricaoEfetiva:
                                    If(
                                        IsBlank(Trim(txtFormDescricao.Value)),
                                        PlainText(Coalesce(varRegistroSelecionado.Descrição, "")),
                                        Trim(txtFormDescricao.Value)
                                    ),
                                vLinkEfetivo:
                                    If(
                                        IsBlank(Trim(txtFormLink.Value)),
                                        Coalesce(varRegistroSelecionado.'Link de Acesso', ""),
                                        Trim(txtFormLink.Value)
                                    ),
                                vPeriodicidadeEfetiva:
                                    If(
                                        IsBlank(Trim(txtFormPeriodicidade.Value)),
                                        Coalesce(varRegistroSelecionado.'Periodicidade de Atualização', ""),
                                        Trim(txtFormPeriodicidade.Value)
                                    )
                            },
                            If(
                                IsBlank(vNomeEfetivo),
                                    Set(varErroFormulario, "Informe o nome do relatório ou aplicativo."),
                                IsBlank(drpFormTipo.Selected.Value),
                                    Set(varErroFormulario, "Selecione o tipo do item."),
                                IsBlank(drpFormAmbiente.Selected.Value),
                                    Set(varErroFormulario, "Selecione o ambiente de publicação."),
                                IsBlank(drpFormArea.Selected.Value),
                                    Set(varErroFormulario, "Selecione a gerência/área responsável."),
                                IsBlank(drpFormCategoria.Selected.Value),
                                    Set(varErroFormulario, "Selecione a categoria."),
                                IsBlank(vLinkEfetivo),
                                    Set(varErroFormulario, "Informe o link de acesso."),
                                varIsAdmin And IsBlank(drpFormResponsavel.Selected) And IsBlank(Trim(txtFormNovoResponsavelEmail.Value)) And varModoFormulario = "NOVO",
                                    Set(varErroFormulario, "Selecione o responsável pela atualização ou informe um e-mail."),
                                !varIsAdmin And IsBlank(varEmailUsuario),
                                    Set(varErroFormulario, "Não foi possível identificar o usuário conectado."),
                                varModoFormulario = "EDITAR" And !varIsAdmin And Lower(Coalesce(varRegistroSelecionado.'Responsável pela Atualização'.Email, "")) <> varEmailUsuario,
                                    Set(varErroFormulario, "Você não possui mais permissão para editar este item."),

                                Set(varSalvando, true);
                                Set(
                                    varResponsavelGravacao,
                                    If(
                                        !varIsAdmin,
                                            If(
                                                varModoFormulario = "EDITAR",
                                                varRegistroSelecionado.'Responsável pela Atualização',
                                                {
                                                    Claims: "i:0#.f|membership|" & varEmailUsuario,
                                                    DisplayName: User().FullName,
                                                    Email: varEmailUsuario
                                                }
                                            ),
                                        !IsBlank(Trim(txtFormNovoResponsavelEmail.Value)),
                                            {
                                                Claims: "i:0#.f|membership|" & Lower(Trim(txtFormNovoResponsavelEmail.Value)),
                                                DisplayName: Proper(Substitute(Left(Trim(txtFormNovoResponsavelEmail.Value), Find("@", Trim(txtFormNovoResponsavelEmail.Value) & "@") - 1), ".", " ")),
                                                Email: Lower(Trim(txtFormNovoResponsavelEmail.Value))
                                            },
                                        !IsBlank(drpFormResponsavel.Selected),
                                            {
                                                Claims: "i:0#.f|membership|" & drpFormResponsavel.Selected.EmailResp,
                                                DisplayName: drpFormResponsavel.Selected.NomeResp,
                                                Email: drpFormResponsavel.Selected.EmailResp
                                            },
                                        varModoFormulario = "EDITAR",
                                            varRegistroSelecionado.'Responsável pela Atualização',
                                            {
                                                Claims: "i:0#.f|membership|" & varEmailUsuario,
                                                DisplayName: User().FullName,
                                                Email: varEmailUsuario
                                            }
                                    )
                                );
                                Set(
                                    varResultadoGravacao,
                                    Patch(
                                        'GD - Lista de Relatórios Power BI',
                                        If(varModoFormulario = "NOVO", Defaults('GD - Lista de Relatórios Power BI'), varRegistroSelecionado),
                                        {
                                            'Nome do Relatório': vNomeEfetivo,
                                            Descrição: vDescricaoEfetiva,
                                            'Tipo de Item': {Value: drpFormTipo.Selected.Value},
                                            'Ambiente de Publicação': {Value: drpFormAmbiente.Selected.Value},
                                            Gerência: {Value: drpFormArea.Selected.Value},
                                            Coordenação: {Value: drpFormCoordenacao.Selected.Value},
                                            'Categoria Relatório': {Value: drpFormCategoria.Selected.Value},
                                            'Periodicidade de Atualização': vPeriodicidadeEfetiva,
                                            'Responsável pela Atualização': varResponsavelGravacao,
                                            'Link de Acesso': vLinkEfetivo
                                        }
                                    )
                                );
                                If(
                                    IsBlankOrError(varResultadoGravacao),
                                        Set(varErroFormulario, "Não foi possível salvar as alterações. Tente novamente.");
                                        Set(varSalvando, false),

                                        Set(varSalvando, false);
                                        Refresh('GD - Lista de Relatórios Power BI');
                                        Set(varModalAberto, false);
                                        Set(varRegistroSelecionado, Blank());
                                        Set(varErroFormulario, "");
                                        Set(
                                            varPodeAdicionar,
                                            varIsAdmin Or
                                            CountRows(
                                                Filter(
                                                    'GD - Lista de Relatórios Power BI',
                                                    Lower('Responsável pela Atualização'.Email) = varEmailUsuario
                                                )
                                            ) > 0
                                        );
                                        Notify("Registro salvo com sucesso.", NotificationType.Success)
                                )
                            )
                        ),
                        false
                    )

      - cntConfirmarDescarte:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            DropShadow: =DropShadow.Regular
            Fill: =RGBA(255, 255, 255, 1)
            Height: =150
            RadiusBottomLeft: =12
            RadiusBottomRight: =12
            RadiusTopLeft: =12
            RadiusTopRight: =12
            Visible: =varConfirmarDescarte
            Width: =320
            X: =(Parent.Width - 320) / 2
            Y: =(Parent.Height - 150) / 2
          Children:
            - lblConfirmarDescarte:
                Control: Text@0.0.51
                Properties:
                  FontColor: =RGBA(0, 80, 97, 1)
                  Height: =60
                  Size: =12
                  Text: ="Existem alterações não salvas. Deseja realmente descartá-las?"
                  Weight: ='TextCanvas.Weight'.Semibold
                  Width: =272
                  X: =24
                  Y: =20

            - btnContinuarEditando:
                Control: Button@0.0.45
                Properties:
                  AccessibleLabel: ="Continuar editando"
                  BorderColor: =RGBA(184, 196, 199, 1)
                  BorderThickness: =1
                  Height: =38
                  Text: ="Continuar editando"
                  Width: =140
                  X: =24
                  Y: =92
                  OnSelect: =Set(varConfirmarDescarte, false)

            - btnDescartar:
                Control: Button@0.0.45
                Properties:
                  AccessibleLabel: ="Descartar alterações"
                  BorderThickness: =0
                  Height: =38
                  Text: ="Descartar"
                  Width: =132
                  X: =24 + 140 + 12
                  Y: =92
                  OnSelect: |-
                    =Set(varConfirmarDescarte, false);
                    Set(varModalAberto, false);
                    Set(varRegistroSelecionado, Blank());
                    Set(varErroFormulario, "")
