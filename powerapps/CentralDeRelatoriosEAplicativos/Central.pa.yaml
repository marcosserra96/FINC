Screens:
  Central:
    Properties:
      Fill: =RGBA(244, 246, 247, 1)
      OnVisible: |-
        =Set(varEmailUsuario, Lower(User().Email));

        Set(varIsAdmin, varEmailUsuario = "marcos.serra@energisa.com.br");

        ClearCollect(colCategorias, {Value: "Todas"});
        Collect(
            colCategorias,
            Sort(
                Distinct(
                    Filter(
                        'GD - Lista de Relatórios Power BI',
                        !IsBlank('Categoria Relatório'.Value)
                    ),
                    'Categoria Relatório'.Value
                ),
                Value,
                SortOrder.Ascending
            )
        );

        ClearCollect(colAreas, {Value: "Todas"});
        Collect(
            colAreas,
            Sort(
                Distinct(
                    Filter(
                        'GD - Lista de Relatórios Power BI',
                        !IsBlank(Gerência.Value)
                    ),
                    Gerência.Value
                ),
                Value,
                SortOrder.Ascending
            )
        );

        ClearCollect(
            colTipoItemOpcoes,
            Sort(Choices('GD - Lista de Relatórios Power BI'.'Tipo de Item'), Value, SortOrder.Ascending)
        );

        ClearCollect(
            colAmbienteOpcoes,
            Sort(Choices('GD - Lista de Relatórios Power BI'.'Ambiente de Publicação'), Value, SortOrder.Ascending)
        );

        ClearCollect(
            colAreaOpcoesForm,
            Sort(Choices('GD - Lista de Relatórios Power BI'.Gerência), Value, SortOrder.Ascending)
        );

        ClearCollect(
            colCoordenacaoOpcoesForm,
            Sort(Choices('GD - Lista de Relatórios Power BI'.Coordenação), Value, SortOrder.Ascending)
        );

        ClearCollect(
            colCategoriaOpcoesForm,
            Sort(Choices('GD - Lista de Relatórios Power BI'.'Categoria Relatório'), Value, SortOrder.Ascending)
        );

        ClearCollect(
            colResponsaveisBrutos,
            Distinct(
                Filter(
                    'GD - Lista de Relatórios Power BI',
                    !IsBlank('Responsável pela Atualização'.Email)
                ),
                Lower('Responsável pela Atualização'.Email) & "|" & Coalesce('Responsável pela Atualização'.DisplayName, 'Responsável pela Atualização'.Email)
            )
        );

        ClearCollect(
            colResponsaveis,
            Sort(
                AddColumns(
                    colResponsaveisBrutos,
                    "EmailResp",
                    Lower(Mid(Value, 1, Find("|", Value) - 1)),
                    "NomeResp",
                    Mid(Value, Find("|", Value) + 1, 200)
                ),
                NomeResp,
                SortOrder.Ascending
            )
        );

        Set(
            varPodeAdicionar,
            varIsAdmin Or
            CountRows(
                Filter(
                    'GD - Lista de Relatórios Power BI',
                    Lower('Responsável pela Atualização'.Email) = varEmailUsuario
                )
            ) > 0
        );

        Set(varTipoSelecionado, "TODOS");
        Set(varModalAberto, false);
        Set(varConfirmarDescarte, false);
        Set(varSalvando, false);
        Set(varErroFormulario, "");
        Set(varModoFormulario, "");
        Set(varRegistroSelecionado, Blank())

    Children:
      - cntCabecalho:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            DropShadow: =DropShadow.Regular
            Fill: =RGBA(255, 255, 255, 1)
            Height: =68
            Width: =Parent.Width
            X: =0
            Y: =0
          Children:
            - faixaAzul:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  Fill: =RGBA(0, 159, 194, 1)
                  Height: =4
                  Width: =Parent.Width * 0.86
                  X: =0
                  Y: =0

            - faixaLaranja:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  Fill: =RGBA(243, 112, 33, 1)
                  Height: =4
                  Width: =Parent.Width - Self.X
                  X: =faixaAzul.Width
                  Y: =0

            - marcaAzul:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  Fill: =RGBA(0, 159, 194, 1)
                  Height: =34
                  RadiusBottomLeft: =4
                  RadiusBottomRight: =4
                  RadiusTopLeft: =4
                  RadiusTopRight: =4
                  Width: =6
                  X: =20
                  Y: =17

            - marcaLaranja:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  Fill: =RGBA(243, 112, 33, 1)
                  Height: =34
                  RadiusBottomLeft: =3
                  RadiusBottomRight: =3
                  RadiusTopLeft: =3
                  RadiusTopRight: =3
                  Width: =3
                  X: =29
                  Y: =17

            - lblTitulo:
                Control: Text@0.0.51
                Properties:
                  FontColor: =RGBA(0, 80, 97, 1)
                  Height: =29
                  Size: =22
                  Text: ="Central de Relatórios e Aplicativos"
                  VerticalAlign: =VerticalAlign.Middle
                  Weight: ='TextCanvas.Weight'.Bold
                  Width: =Min(620, Parent.Width - 390)
                  X: =45
                  Y: =9

            - lblSubtitulo:
                Control: Text@0.0.51
                Properties:
                  FontColor: =RGBA(243, 112, 33, 1)
                  Height: =18
                  Size: =11
                  Text: ="Energisa Minas Rio"
                  VerticalAlign: =VerticalAlign.Middle
                  Weight: ='TextCanvas.Weight'.Semibold
                  Width: =300
                  X: =45
                  Y: =38

            - lblUsuario:
                Control: Text@0.0.51
                Properties:
                  Align: ='TextCanvas.Align'.End
                  FontColor: =RGBA(38, 73, 81, 1)
                  Height: =22
                  Size: =11
                  Text: =First(Split(User().FullName, " ")).Value
                  VerticalAlign: =VerticalAlign.Middle
                  Weight: ='TextCanvas.Weight'.Semibold
                  Width: =210
                  X: =Parent.Width - 286
                  Y: =23

            - imgUsuario:
                Control: Image@2.2.3
                Properties:
                  AccessibleLabel: ="Foto do usuário conectado"
                  Height: =42
                  Image: =User().Image
                  ImagePosition: =ImagePosition.Fill
                  RadiusBottomLeft: =21
                  RadiusBottomRight: =21
                  RadiusTopLeft: =21
                  RadiusTopRight: =21
                  Width: =42
                  X: =Parent.Width - 62
                  Y: =12

      - cntFiltros:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            DropShadow: =DropShadow.Regular
            Fill: =RGBA(255, 255, 255, 1)
            Height: =If(App.Width >= 1200, 86, 190)
            RadiusBottomLeft: =12
            RadiusBottomRight: =12
            RadiusTopLeft: =12
            RadiusTopRight: =12
            Width: =Parent.Width - 40
            X: =20
            Y: =80
          Children:
            - lblTipo:
                Control: Text@0.0.51
                Properties:
                  FontColor: =RGBA(102, 119, 125, 1)
                  Height: =16
                  Size: =8
                  Text: ="TIPO DE CONTEÚDO"
                  VerticalAlign: =VerticalAlign.Middle
                  Weight: ='TextCanvas.Weight'.Bold
                  Width: =180
                  X: =18
                  Y: =10

            - baseTipo:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  Fill: =RGBA(239, 244, 245, 1)
                  Height: =38
                  RadiusBottomLeft: =9
                  RadiusBottomRight: =9
                  RadiusTopLeft: =9
                  RadiusTopRight: =9
                  Width: =If(App.Width >= 1200, 310, Parent.Width - 36)
                  X: =18
                  Y: =30

            - btnTipoTodos:
                Control: HtmlViewer@2.1.0
                Properties:
                  Height: =32
                  HtmlText: |-
                    =With(
                        {
                            vSelecionado: Coalesce(varTipoSelecionado, "TODOS") = "TODOS",
                            vLargura: Text(RoundDown(Self.Width - 4, 0), "[$-en-US]0"),
                            vAltura: Text(RoundDown(Self.Height - 4, 0), "[$-en-US]0")
                        },
                        "
                        <div style='
                            width:" & vLargura & "px;
                            height:" & vAltura & "px;
                            box-sizing:border-box;
                            display:flex;
                            align-items:center;
                            justify-content:center;
                            border-radius:7px;
                            background:" & If(vSelecionado, "#005061", "transparent") & ";
                            color:" & If(vSelecionado, "#FFFFFF", "#52666C") & ";
                            box-shadow:" & If(vSelecionado, "0 3px 8px rgba(0,80,97,0.20)", "none") & ";
                            font-family:Segoe UI,Arial,sans-serif;
                            font-size:10px;
                            font-weight:700;
                            cursor:pointer;
                            margin:2px;
                            overflow:hidden;
                        '>
                            Todos
                        </div>
                        "
                    )
                  OnSelect: =Set(varTipoSelecionado, "TODOS")
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Width: =(baseTipo.Width - 6) / 3
                  X: =baseTipo.X + 3
                  Y: =33

            - btnTipoRelatorios:
                Control: HtmlViewer@2.1.0
                Properties:
                  Height: =32
                  HtmlText: |-
                    =With(
                        {
                            vSelecionado: Coalesce(varTipoSelecionado, "TODOS") = "RELATÓRIOS",
                            vLargura: Text(RoundDown(Self.Width - 4, 0), "[$-en-US]0"),
                            vAltura: Text(RoundDown(Self.Height - 4, 0), "[$-en-US]0")
                        },
                        "
                        <div style='
                            width:" & vLargura & "px;
                            height:" & vAltura & "px;
                            box-sizing:border-box;
                            display:flex;
                            align-items:center;
                            justify-content:center;
                            border-radius:7px;
                            background:" & If(vSelecionado, "#005061", "transparent") & ";
                            color:" & If(vSelecionado, "#FFFFFF", "#52666C") & ";
                            box-shadow:" & If(vSelecionado, "0 3px 8px rgba(0,80,97,0.20)", "none") & ";
                            font-family:Segoe UI,Arial,sans-serif;
                            font-size:10px;
                            font-weight:700;
                            cursor:pointer;
                            margin:2px;
                            overflow:hidden;
                        '>
                            Relatórios
                        </div>
                        "
                    )
                  OnSelect: =Set(varTipoSelecionado, "RELATÓRIOS")
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Width: =(baseTipo.Width - 6) / 3
                  X: =btnTipoTodos.X + btnTipoTodos.Width
                  Y: =33

            - btnTipoAplicativos:
                Control: HtmlViewer@2.1.0
                Properties:
                  Height: =32
                  HtmlText: |-
                    =With(
                        {
                            vSelecionado: Coalesce(varTipoSelecionado, "TODOS") = "APLICATIVOS",
                            vLargura: Text(RoundDown(Self.Width - 4, 0), "[$-en-US]0"),
                            vAltura: Text(RoundDown(Self.Height - 4, 0), "[$-en-US]0")
                        },
                        "
                        <div style='
                            width:" & vLargura & "px;
                            height:" & vAltura & "px;
                            box-sizing:border-box;
                            display:flex;
                            align-items:center;
                            justify-content:center;
                            border-radius:7px;
                            background:" & If(vSelecionado, "#005061", "transparent") & ";
                            color:" & If(vSelecionado, "#FFFFFF", "#52666C") & ";
                            box-shadow:" & If(vSelecionado, "0 3px 8px rgba(0,80,97,0.20)", "none") & ";
                            font-family:Segoe UI,Arial,sans-serif;
                            font-size:10px;
                            font-weight:700;
                            cursor:pointer;
                            margin:2px;
                            overflow:hidden;
                        '>
                            Aplicativos
                        </div>
                        "
                    )
                  OnSelect: =Set(varTipoSelecionado, "APLICATIVOS")
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Width: =(baseTipo.Width - 6) / 3
                  X: =btnTipoRelatorios.X + btnTipoRelatorios.Width
                  Y: =33

            - lblArea:
                Control: Text@0.0.51
                Properties:
                  FontColor: =RGBA(102, 119, 125, 1)
                  Height: =16
                  Size: =8
                  Text: ="ÁREA"
                  Visible: =App.Width >= 1200
                  VerticalAlign: =VerticalAlign.Middle
                  Weight: ='TextCanvas.Weight'.Bold
                  Width: =120
                  X: =350
                  Y: =10

            - drpArea:
                Control: ModernDropdown@1.0.2
                Properties:
                  AccessibleLabel: ="Filtrar por área"
                  Default: =First(colAreas)
                  Height: =38
                  ItemDisplayText: =ThisItem.Value
                  Items: =colAreas
                  Width: |-
                    =If(
                        App.Width >= 1200,
                        170,
                        (Parent.Width - 52) / 2
                    )
                  X: =If(App.Width >= 1200, 350, 18)
                  Y: =If(App.Width >= 1200, 30, 84)

            - lblCategoria:
                Control: Text@0.0.51
                Properties:
                  FontColor: =RGBA(102, 119, 125, 1)
                  Height: =16
                  Size: =8
                  Text: ="CATEGORIA"
                  Visible: =App.Width >= 1200
                  VerticalAlign: =VerticalAlign.Middle
                  Weight: ='TextCanvas.Weight'.Bold
                  Width: =150
                  X: =536
                  Y: =10

            - drpCategoria:
                Control: ModernDropdown@1.0.2
                Properties:
                  AccessibleLabel: ="Filtrar por categoria"
                  Default: =First(colCategorias)
                  Height: =38
                  ItemDisplayText: =ThisItem.Value
                  Items: =colCategorias
                  Width: |-
                    =If(
                        App.Width >= 1200,
                        200,
                        (Parent.Width - 52) / 2
                    )
                  X: =If(App.Width >= 1200, 536, drpArea.X + drpArea.Width + 16)
                  Y: =If(App.Width >= 1200, 30, 84)

            - lblPesquisa:
                Control: Text@0.0.51
                Properties:
                  FontColor: =RGBA(102, 119, 125, 1)
                  Height: =16
                  Size: =8
                  Text: ="PESQUISAR"
                  Visible: =App.Width >= 1200
                  VerticalAlign: =VerticalAlign.Middle
                  Weight: ='TextCanvas.Weight'.Bold
                  Width: =120
                  X: =756
                  Y: =10

            - icoPesquisa:
                Control: Icon@0.0.7
                Properties:
                  Height: =28
                  Icon: ="Search"
                  IconColor: =RGBA(0, 159, 194, 1)
                  IconStyle: ='Icon.IconStyle'.Outline
                  Width: =24
                  X: =If(App.Width >= 1200, 764, 26)
                  Y: =If(App.Width >= 1200, 35, 145)

            - txtPesquisa:
                Control: TextInput@0.0.54
                Properties:
                  AccessibleLabel: ="Pesquisar conteúdos"
                  Appearance: ='TextInputCanvas.Appearance'.Outline
                  Height: =38
                  Placeholder: ="Pesquisar por título, descrição, área, categoria ou responsável"
                  TriggerOutput: ='TextInputCanvas.TriggerOutput'.Keypress
                  Width: |-
                    =If(
                        App.Width >= 1200,
                        Parent.Width - 756 - 138,
                        Parent.Width - 36 - 116
                    )
                  X: =If(App.Width >= 1200, 756, 18)
                  Y: =If(App.Width >= 1200, 30, 138)

            - btnLimpar:
                Control: HtmlViewer@2.1.0
                Properties:
                  Height: =38
                  HtmlText: |-
                    =With(
                        {
                            vTemFiltro:
                                Or(
                                    Coalesce(varTipoSelecionado, "TODOS") <> "TODOS",
                                    Coalesce(drpArea.Selected.Value, "Todas") <> "Todas",
                                    Coalesce(drpCategoria.Selected.Value, "Todas") <> "Todas",
                                    !IsBlank(Trim(txtPesquisa.Value))
                                ),
                            vLargura: Text(RoundDown(Self.Width - 4, 0), "[$-en-US]0"),
                            vAltura: Text(RoundDown(Self.Height - 4, 0), "[$-en-US]0")
                        },
                        "
                        <div style='
                            width:" & vLargura & "px;
                            height:" & vAltura & "px;
                            box-sizing:border-box;
                            display:flex;
                            align-items:center;
                            justify-content:center;
                            gap:6px;
                            border-radius:8px;
                            border:1px solid " & If(vTemFiltro, "#F0C5A9", "#D8E3E5") & ";
                            background:" & If(vTemFiltro, "#FFF5EF", "#FFFFFF") & ";
                            color:" & If(vTemFiltro, "#A94C12", "#5F7177") & ";
                            font-family:Segoe UI,Arial,sans-serif;
                            font-size:9px;
                            font-weight:700;
                            cursor:pointer;
                            margin:2px;
                            overflow:hidden;
                        '>
                            <span style='color:#F37021;font-size:14px;'>&#8635;</span>
                            LIMPAR
                        </div>
                        "
                    )
                  OnSelect: |-
                    =Set(varTipoSelecionado, "TODOS");
                    Reset(drpArea);
                    Reset(drpCategoria);
                    Reset(txtPesquisa)
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Width: =If(App.Width >= 1200, 104, 100)
                  X: =Parent.Width - If(App.Width >= 1200, 122, 118)
                  Y: =If(App.Width >= 1200, 30, 138)

      - cntResultados:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =RGBA(244, 246, 247, 1)
            Height: =52
            Width: =Parent.Width
            X: =0
            Y: =cntFiltros.Y + cntFiltros.Height + 4
          Children:
            - lblQuantidade:
                Control: Text@0.0.51
                Properties:
                  FontColor: =RGBA(49, 78, 85, 1)
                  Height: =26
                  Size: =11
                  Text: |-
                    =With(
                        {
                            vQuantidade: CountRows(galCatalogo.AllItems)
                        },
                        vQuantidade &
                        If(
                            vQuantidade = 1,
                            " conteúdo encontrado",
                            " conteúdos encontrados"
                        )
                    )
                  VerticalAlign: =VerticalAlign.Middle
                  Weight: ='TextCanvas.Weight'.Bold
                  Width: =330
                  X: =28
                  Y: =12

            - btnAdicionarNovo:
                Control: Button@0.0.45
                Properties:
                  AccessibleLabel: ="Adicionar novo conteúdo"
                  BorderThickness: =0
                  Height: =36
                  Text: ="+  Adicionar novo"
                  Visible: =varPodeAdicionar
                  Width: =172
                  X: =Parent.Width - 200
                  Y: =8
                  OnSelect: |-
                    =If(
                        varPodeAdicionar,
                        Set(varModoFormulario, "NOVO");
                        Set(varRegistroSelecionado, Blank());
                        Set(varErroFormulario, "");
                        Set(varConfirmarDescarte, false);
                        Reset(txtFormNome);
                        Reset(txtFormDescricao);
                        Reset(txtFormLink);
                        Reset(txtFormPeriodicidade);
                        Reset(txtFormNovoResponsavelEmail);
                        Reset(drpFormTipo);
                        Reset(drpFormAmbiente);
                        Reset(drpFormArea);
                        Reset(drpFormCoordenacao);
                        Reset(drpFormCategoria);
                        Reset(drpFormResponsavel);
                        Set(varModalAberto, true),
                        Notify("Você não possui permissão para adicionar novos registros.", NotificationType.Error)
                    )

      - galCatalogo:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            Height: =Parent.Height - Self.Y
            Items: |-
              =With(
                  {
                      vTipo:
                          Coalesce(
                              varTipoSelecionado,
                              "TODOS"
                          ),

                      vArea:
                          Coalesce(
                              drpArea.Selected.Value,
                              "Todas"
                          ),

                      vCategoria:
                          Coalesce(
                              drpCategoria.Selected.Value,
                              "Todas"
                          ),

                      vPesquisa:
                          Lower(
                              Trim(
                                  txtPesquisa.Value
                              )
                          )
                  },

                  SortByColumns(
                      Filter(
                          'GD - Lista de Relatórios Power BI',

                          Or(
                              vTipo = "TODOS",
                              And(
                                  vTipo = "RELATÓRIOS",
                                  'Tipo de Item'.Value = "Relatório"
                              ),
                              And(
                                  vTipo = "APLICATIVOS",
                                  'Tipo de Item'.Value = "Aplicativo"
                              )
                          ),

                          Or(
                              vArea = "Todas",
                              Gerência.Value = vArea
                          ),

                          Or(
                              vCategoria = "Todas",
                              'Categoria Relatório'.Value = vCategoria
                          ),

                          Or(
                              IsBlank(vPesquisa),
                              vPesquisa in Lower(
                                  Coalesce(
                                      'Nome do Relatório',
                                      ""
                                  )
                              ),
                              vPesquisa in Lower(
                                  Coalesce(
                                      Descrição,
                                      ""
                                  )
                              ),
                              vPesquisa in Lower(
                                  Coalesce(
                                      Gerência.Value,
                                      ""
                                  )
                              ),
                              vPesquisa in Lower(
                                  Coalesce(
                                      Coordenação.Value,
                                      ""
                                  )
                              ),
                              vPesquisa in Lower(
                                  Coalesce(
                                      'Categoria Relatório'.Value,
                                      ""
                                  )
                              ),
                              vPesquisa in Lower(
                                  Coalesce(
                                      'Responsável pela Atualização'.DisplayName,
                                      ""
                                  )
                              ),
                              vPesquisa in Lower(
                                  Coalesce(
                                      'Tipo de Item'.Value,
                                      ""
                                  )
                              ),
                              vPesquisa in Lower(
                                  Coalesce(
                                      'Ambiente de Publicação'.Value,
                                      ""
                                  )
                              )
                          )
                      ),
                      "NomedoRelat_x00f3_rio",
                      SortOrder.Ascending
                  )
              )
            TemplatePadding: =0
            TemplateSize: =230
            ShowScrollbar: =false
            Width: =Parent.Width
            WrapCount: |-
              =If(
                  App.Width >= 1350,
                  3,
                  App.Width >= 850,
                  2,
                  1
              )
            X: =0
            Y: =cntResultados.Y + cntResultados.Height
          Children:
            - htmlCard:
                Control: HtmlViewer@2.1.0
                Properties:
                  Height: =216
                  HtmlText: |-
                    =With(
                        {
                            vTipo:
                                Upper(
                                    Coalesce(
                                        ThisItem.'Tipo de Item'.Value,
                                        "Item"
                                    )
                                ),

                            vAmbiente:
                                Coalesce(
                                    ThisItem.'Ambiente de Publicação'.Value,
                                    ""
                                ),

                            vCategoria:
                                Coalesce(
                                    ThisItem.'Categoria Relatório'.Value,
                                    "Sem categoria"
                                ),

                            vArea:
                                Coalesce(
                                    ThisItem.Gerência.Value,
                                    "Sem área"
                                ),

                            vTitulo:
                                Coalesce(
                                    ThisItem.'Nome do Relatório',
                                    "Sem título"
                                ),

                            vDescricao:
                                PlainText(
                                    Coalesce(
                                        ThisItem.Descrição,
                                        "Nenhuma descrição cadastrada."
                                    )
                                ),

                            vAtualizacao:
                                Coalesce(
                                    ThisItem.'Periodicidade de Atualização',
                                    "Sob demanda"
                                ),

                            vResponsavel:
                                Coalesce(
                                    ThisItem.'Responsável pela Atualização'.DisplayName,
                                    "Responsável não informado"
                                ),

                            vFoto:
                                Coalesce(
                                    ThisItem.'Responsável pela Atualização'.Picture,
                                    ""
                                ),

                            vTemLink:
                                !IsBlank(
                                    ThisItem.'Link de Acesso'
                                ),

                            vLarguraReservada:
                                If(
                                    varIsAdmin Or
                                    Lower(
                                        Coalesce(
                                            ThisItem.'Responsável pela Atualização'.Email,
                                            ""
                                        )
                                    ) = varEmailUsuario,
                                    164,
                                    92
                                ),

                            vLarguraCard:
                                Text(
                                    RoundDown(Self.Width - 8, 0),
                                    "[$-en-US]0"
                                ),

                            vAlturaCard:
                                Text(
                                    RoundDown(Self.Height - 8, 0),
                                    "[$-en-US]0"
                                )
                        },

                        With(
                            {
                                vIniciais:
                                    Upper(
                                        Left(
                                            First(
                                                Split(
                                                    vResponsavel,
                                                    " "
                                                )
                                            ).Value,
                                            1
                                        ) &
                                        If(
                                            CountRows(
                                                Split(
                                                    vResponsavel,
                                                    " "
                                                )
                                            ) > 1,
                                            Left(
                                                Last(
                                                    Split(
                                                        vResponsavel,
                                                        " "
                                                    )
                                                ).Value,
                                                1
                                            ),
                                            ""
                                        )
                                    ),

                                vTituloHtml:
                                    Substitute(
                                        Substitute(
                                            Substitute(
                                                vTitulo,
                                                "&",
                                                "&amp;"
                                            ),
                                            "<",
                                            "&lt;"
                                        ),
                                        ">",
                                        "&gt;"
                                    ),

                                vDescricaoHtml:
                                    Substitute(
                                        Substitute(
                                            Substitute(
                                                vDescricao,
                                                "&",
                                                "&amp;"
                                            ),
                                            "<",
                                            "&lt;"
                                        ),
                                        ">",
                                        "&gt;"
                                    ),

                                vResponsavelHtml:
                                    Substitute(
                                        Substitute(
                                            Substitute(
                                                vResponsavel,
                                                "&",
                                                "&amp;"
                                            ),
                                            "<",
                                            "&lt;"
                                        ),
                                        ">",
                                        "&gt;"
                                    ),

                                vFotoHtml:
                                    Substitute(
                                        Substitute(
                                            vFoto,
                                            "&",
                                            "&amp;"
                                        ),
                                        "'",
                                        "%27"
                                    )
                            },

                            "
                            <div style='
                                width:" & vLarguraCard & "px;
                                height:" & vAlturaCard & "px;
                                margin:4px;
                                box-sizing:border-box;
                                display:flex;
                                flex-direction:column;
                                overflow:hidden;
                                padding:14px 16px 0 16px;
                                background:#FFFFFF;
                                border:1px solid #DDE5E7;
                                border-radius:12px;
                                box-shadow:0 2px 4px rgba(0,80,97,0.08);
                                font-family:Segoe UI,Arial,sans-serif;
                                cursor:pointer;
                            '>

                                <div style='
                                    height:22px;
                                    display:flex;
                                    align-items:center;
                                    justify-content:space-between;
                                    gap:8px;
                                '>
                                    <span style='
                                        display:inline-block;
                                        padding:3px 9px;
                                        border-radius:14px;
                                        background:" & If(vTipo = "APLICATIVO", "#EAF2FF", "#EDF5F6") & ";
                                        color:" & If(vTipo = "APLICATIVO", "#245CA6", "#005061") & ";
                                        font-size:9px;
                                        line-height:14px;
                                        font-weight:700;
                                        letter-spacing:0.3px;
                                        white-space:nowrap;
                                    '>
                                        " & vTipo & "
                                    </span>

                                    " &
                                    If(
                                        !IsBlank(vAmbiente),
                                        "
                                        <span style='
                                            display:inline-block;
                                            padding:3px 9px;
                                            border-radius:14px;
                                            background:" & If(vAmbiente = "Report Server", "#FFF1E8", "#FFF8D8") & ";
                                            color:" & If(vAmbiente = "Report Server", "#B94C0E", "#745C00") & ";
                                            font-size:9px;
                                            line-height:14px;
                                            font-weight:700;
                                            white-space:nowrap;
                                        '>
                                            " & vAmbiente & "
                                        </span>
                                        ",
                                        ""
                                    ) &
                                    "
                                </div>

                                <div style='
                                    height:42px;
                                    margin-top:7px;
                                    color:#003F4C;
                                    font-size:16px;
                                    line-height:20px;
                                    font-weight:700;
                                    overflow:hidden;
                                    display:-webkit-box;
                                    -webkit-box-orient:vertical;
                                    -webkit-line-clamp:2;
                                '>
                                    " & vTituloHtml & "
                                </div>

                                <div style='
                                    height:22px;
                                    margin-top:4px;
                                    display:flex;
                                    align-items:center;
                                    gap:6px;
                                    overflow:hidden;
                                '>
                                    <span style='
                                        display:inline-block;
                                        max-width:64%;
                                        padding:3px 8px;
                                        border-radius:14px;
                                        background:#E5F6FA;
                                        color:#007C98;
                                        font-size:9px;
                                        line-height:14px;
                                        font-weight:600;
                                        white-space:nowrap;
                                        overflow:hidden;
                                        text-overflow:ellipsis;
                                    '>
                                        " & vCategoria & "
                                    </span>

                                    <span style='
                                        display:inline-block;
                                        max-width:31%;
                                        padding:3px 8px;
                                        border-radius:14px;
                                        background:#F1F4F5;
                                        color:#526168;
                                        font-size:9px;
                                        line-height:14px;
                                        font-weight:600;
                                        white-space:nowrap;
                                        overflow:hidden;
                                        text-overflow:ellipsis;
                                    '>
                                        " & vArea & "
                                    </span>
                                </div>

                                <div style='
                                    height:49px;
                                    margin-top:6px;
                                    color:#3B4D52;
                                    font-size:11px;
                                    line-height:16px;
                                    overflow:hidden;
                                    display:-webkit-box;
                                    -webkit-box-orient:vertical;
                                    -webkit-line-clamp:3;
                                '>
                                    " & vDescricaoHtml & "
                                </div>

                                <div style='
                                    height:52px;
                                    margin-top:auto;
                                    display:flex;
                                    align-items:center;
                                    box-sizing:border-box;
                                    border-top:1px solid #E8EEF0;
                                '>
                                    <div style='
                                        width:36px;
                                        min-width:36px;
                                        height:36px;
                                        margin-right:9px;
                                    '>
                                        " &
                                        If(
                                            !IsBlank(vFotoHtml),
                                            "
                                            <img
                                                src='" & vFotoHtml & "'
                                                alt='Foto do responsável'
                                                style='
                                                    width:36px;
                                                    height:36px;
                                                    display:block;
                                                    object-fit:cover;
                                                    border-radius:50%;
                                                    border:1px solid #D7E3E6;
                                                '
                                            />
                                            ",
                                            "
                                            <div style='
                                                width:36px;
                                                height:36px;
                                                display:flex;
                                                align-items:center;
                                                justify-content:center;
                                                box-sizing:border-box;
                                                border-radius:50%;
                                                background:#E5F6FA;
                                                border:1px solid #CDE9EF;
                                                color:#005061;
                                                font-size:11px;
                                                font-weight:700;
                                            '>
                                                " & vIniciais & "
                                            </div>
                                            "
                                        ) &
                                        "
                                    </div>

                                    <div style='
                                        min-width:0;
                                        flex:1;
                                        padding-right:10px;
                                        overflow:hidden;
                                    '>
                                        <div style='
                                            color:#16444E;
                                            font-size:11px;
                                            line-height:15px;
                                            font-weight:700;
                                            white-space:nowrap;
                                            overflow:hidden;
                                            text-overflow:ellipsis;
                                        '>
                                            " & vResponsavelHtml & "
                                        </div>

                                        <div style='
                                            margin-top:1px;
                                            color:#718087;
                                            font-size:9px;
                                            line-height:12px;
                                            white-space:nowrap;
                                            overflow:hidden;
                                            text-overflow:ellipsis;
                                        '>
                                            Atualização: " & vAtualizacao & "
                                        </div>
                                    </div>

                                    <div style='
                                        width:" & vLarguraReservada & "px;
                                        min-width:" & vLarguraReservada & "px;
                                        height:31px;
                                    '></div>
                                </div>

                            </div>
                            "
                        )
                    )
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Width: =Parent.TemplateWidth - 20
                  X: =10
                  Y: =7

            - btnEditarCard:
                Control: Button@0.0.45
                Properties:
                  AccessibleLabel: ="Editar " & Coalesce(ThisItem.'Nome do Relatório', "item")
                  BorderThickness: =0
                  Height: =28
                  Text: ="Editar"
                  Visible: |-
                    =varIsAdmin Or
                    Lower(Coalesce(ThisItem.'Responsável pela Atualização'.Email, "")) = varEmailUsuario
                  Width: =64
                  X: =Parent.TemplateWidth - 184
                  Y: =185
                  OnSelect: |-
                    =If(
                        varIsAdmin Or
                        Lower(Coalesce(ThisItem.'Responsável pela Atualização'.Email, "")) = varEmailUsuario,

                        Set(varModoFormulario, "EDITAR");
                        Set(varRegistroSelecionado, ThisItem);
                        Set(varErroFormulario, "");
                        Set(varConfirmarDescarte, false);
                        Reset(txtFormNome);
                        Reset(txtFormDescricao);
                        Reset(txtFormLink);
                        Reset(txtFormPeriodicidade);
                        Reset(txtFormNovoResponsavelEmail);
                        Reset(drpFormTipo);
                        Reset(drpFormAmbiente);
                        Reset(drpFormArea);
                        Reset(drpFormCoordenacao);
                        Reset(drpFormCategoria);
                        Reset(drpFormResponsavel);
                        Set(varModalAberto, true),

                        Notify("Você não possui permissão para editar este item.", NotificationType.Error)
                    )

            - btnAcessarCard:
                Control: Button@0.0.45
                Properties:
                  AccessibleLabel: ="Acessar " & Coalesce(ThisItem.'Nome do Relatório', "item")
                  BorderThickness: =0
                  DisplayMode: =If(IsBlank(ThisItem.'Link de Acesso'), DisplayMode.Disabled, DisplayMode.Edit)
                  Height: =28
                  Text: =If(IsBlank(ThisItem.'Link de Acesso'), "Indisponível", "Acessar")
                  Width: =92
                  X: =Parent.TemplateWidth - 112
                  Y: =185
                  OnSelect: |-
                    =If(
                        !IsBlank(ThisItem.'Link de Acesso'),
                        Launch(ThisItem.'Link de Acesso')
                    )

